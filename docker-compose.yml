services:
  postgres:
    image: postgres:16-alpine
    container_name: oms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-oms}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - oms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-oms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - oms-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: oms-kafka
    restart: unless-stopped
    ports:
      # Only the host-facing (EXTERNAL) listener needs to be published. The
      # INTERNAL listener (9092) is reached by other containers over the
      # compose network by service name and never needs a host port.
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two data listeners instead of one:
      #  - INTERNAL (9092): what other containers (the app) connect to, using
      #    the service name "kafka".
      #  - EXTERNAL (29092): what host tools (e.g. a local Kafka CLI, or the
      #    app when you run it outside Docker) connect to via localhost.
      # Without this split, Kafka advertises "localhost:9092" to every client
      # regardless of where the initial connection came from — which breaks
      # any client running inside another container, since "localhost" there
      # means the container itself, not the kafka container.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      # Runs inside the kafka container, so "localhost:9092" here hits the
      # INTERNAL listener — this is unaffected by the listener split above.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - oms-network

  redis:
    image: redis:7-alpine
    container_name: oms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Password + persistence for anything beyond local dev — set REDIS_PASSWORD in
    # your environment (or an .env file next to this compose file) before deploying.
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - oms-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oms-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oms-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-oms}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Talks to Kafka's INTERNAL listener (see kafka service above) — do not
      # point this at localhost:9092 or 29092 from inside the app container.
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - oms-network

networks:
  oms-network:
    driver: bridge

volumes:
  oms-redis-data:
  oms-postgres-data: