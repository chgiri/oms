# ---------------------------------------------------------------------------
# test profile ? shared QA/test environment (not to be confused with the
# JUnit test run, which uses Testcontainers + @DynamicPropertySource and
# never activates a Spring profile at all ? see AbstractIntegrationTest).
# Behaves like prod-lite: quieter logs, no SQL dump, but still permissive
# enough (Swagger on, throwaway JWT/admin defaults allowed) for testers and
# automated test suites to exercise the API easily.
# ---------------------------------------------------------------------------

logging.level.root=INFO
logging.level.com.giri.oms=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.jpa.show-sql=false
