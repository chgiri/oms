spring.application.name=oms
spring.datasource.url=jdbc:postgresql://localhost:5432/oms
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# DB related
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Kafka ? domain events via transactional outbox (Phase 1: OrderCreated only).
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.kafka.topics.order-events=oms.order.events
app.kafka.outbox.poll-interval-ms=5000
app.kafka.outbox.batch-size=100

# Kafka consumer (Phase 2 ? OrderCreatedInventoryConsumer reserves stock).
# auto-offset-reset=earliest: on a brand-new consumer group (first deploy, or a
# renamed group), read from the start of the topic rather than only new messages
# from now on ? correctness (not missing anyone's order) matters more here than
# avoiding a catch-up backlog on first run.
# enable-auto-commit=false: Spring Kafka commits the offset itself after the
# listener method returns successfully, not on a timer ? so a crash mid-processing
# redelivers the message instead of silently losing it.
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:oms-inventory-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Second consumer group on the same oms.order.events topic ? OrderSagaEventConsumer
# reacts to Phase 2 outcomes (InventoryReserved/InventoryReservationFailed) to move
# orders to AWAITING_PAYMENT/CANCELLED, independently of the inventory group above.
# A distinct group-id is what makes this an independent broadcast subscriber rather
# than competing with oms-inventory-service for the same partitions.
app.kafka.consumer.order-service-group-id=${KAFKA_ORDER_SERVICE_CONSUMER_GROUP:oms-order-service}

# Third consumer group on the same topic ? OrderConfirmedShipmentConsumer
# auto-creates a shipment once Phase 3 confirms an order.
app.kafka.consumer.shipment-service-group-id=${KAFKA_SHIPMENT_SERVICE_CONSUMER_GROUP:oms-shipment-service}

# Default carrier for shipments auto-created off OrderConfirmed (see
# ShipmentAutoCreationServiceImpl) ? the saga has no notion yet of a
# customer-chosen carrier, so every auto-created shipment gets this one until
# that's modeled. Note there's currently no endpoint to change a shipment's
# carrier after creation ? only status/tracking (PATCH .../status) ? so this
# default is effectively permanent per shipment until that's added too.
app.shipment.default-carrier=${SHIPMENT_DEFAULT_CARRIER:OTHER}

# Redis ? shared by: Spring Cache (product/inventory reads), Redisson (distributed
# locks + rate limiter backend) and the JWT logout blacklist. All three reuse this
# single connection, so in production point it at a real Redis/Valkey instance.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# Spring Cache ? backing store + default TTL; per-cache TTLs are set in CacheConfig.
spring.cache.type=redis
spring.cache.redis.time-to-live=10m
spring.cache.redis.cache-null-values=false

# Login rate limiting (Bucket4j + Redis) ? brute-force protection, keyed per client IP.
app.ratelimit.login.capacity=5
app.ratelimit.login.refill-tokens=5
app.ratelimit.login.refill-duration-seconds=60

# Distributed lock (Redisson) around inventory read-modify-write updates, so two app
# instances updating the same inventory row concurrently can't silently drop a change.
app.lock.inventory.wait-seconds=3
app.lock.inventory.lease-seconds=5

# JWT ? secret must be Base64-encoded and at least 32 bytes once decoded (HS256
# requirement). The default below is fine for local dev only; override via the
# JWT_SECRET env var (or an application-{profile}.properties) for anything else.
jwt.secret=${JWT_SECRET:ZmFrZS1kZXYtb25seS1zZWNyZXQtZG8tbm90LXVzZS1pbi1wcm9kLTEyMzQ1Njc4OTA=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Default admin account bootstrapped on first startup if no users exist yet ?
# see com.giri.oms.auth.config.AdminUserSeeder. Change the password after first login.
app.security.default-admin-username=${DEFAULT_ADMIN_USERNAME:admin}
app.security.default-admin-password=${DEFAULT_ADMIN_PASSWORD:Admin@123}


# Pagination ? caps client-requested page size; requests above this are
# silently clamped to max-page-size (not rejected with an error).
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50
spring.data.web.pageable.one-indexed-parameters=false

# Logging
logging.level.root=INFO
logging.level.com.giri.oms=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Sort endpoints/tags alphabetically in the UI
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Optional: move the UI to a custom path
springdoc.swagger-ui.path=/docs

# Optional: exclude from prod if desired
# springdoc.api-docs.enabled=false

# temporary
spring.jpa.show-sql=true
#spring.jpa.hibernate.ddl-auto=update