# ---------------------------------------------------------------------------
# uat profile ? user acceptance testing. Config-wise this is prod-shaped
# (real CORS origin required, quiet logs) but keeps Swagger UI reachable
# since UAT testers/stakeholders often poke the API directly.
# ---------------------------------------------------------------------------

logging.level.root=WARN
logging.level.com.giri.oms=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.jpa.show-sql=false

# No localhost fallback here ? UAT always fronts a real deployed UI, so a
# missing CORS_ALLOWED_ORIGINS should fail startup rather than silently only
# allow localhost.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
