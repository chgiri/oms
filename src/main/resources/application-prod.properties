# ---------------------------------------------------------------------------
# prod profile. Quiet logs, and ? more importantly ? this is where every
# checked-in "convenient" default from application.properties gets removed.
# Each property below has NO fallback value: if the corresponding env var is
# missing, Spring fails to start with a "could not resolve placeholder"
# error instead of silently booting with a throwaway dev secret, an open
# CORS policy, or a public Swagger UI. Fail fast beats fail insecure.
# ---------------------------------------------------------------------------

logging.level.root=WARN
logging.level.com.giri.oms=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.jpa.show-sql=false

# Real RSA key pair required ? the checked-in throwaway pair from
# application.properties must never be reachable in prod.
jwt.private-key=${JWT_PRIVATE_KEY}
jwt.public-key=${JWT_PUBLIC_KEY}

# Real admin password required ? no "Admin@123" fallback in prod.
app.security.default-admin-password=${DEFAULT_ADMIN_PASSWORD}

# Real frontend origin(s) required ? no localhost fallback in prod.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Interactive API docs are attack surface with no upside in prod ? off entirely.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
