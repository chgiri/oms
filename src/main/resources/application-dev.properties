# ---------------------------------------------------------------------------
# dev profile ? local development (docker-compose up, or an IDE run config).
# Verbose logging and visible SQL to make local debugging easy; everything
# else falls back to the throwaway defaults already baked into
# application.properties (JWT keys, admin password, CORS origin), which is
# exactly what those defaults are there for.
# ---------------------------------------------------------------------------

logging.level.root=INFO
logging.level.com.giri.oms=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.jpa.show-sql=true
